<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aşk Sayacı</title>
<style>
  :root{
    --bg:#000000;
    --card:#050505;
    --accent:#ff6b9f;
    --muted:#bfb5d9;
    --glass: rgba(255,255,255,0.04);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background: #000000;
    color: #fff;
    padding:20px;
    overflow: hidden;
    position: relative;
  }

  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: -1;
  }

  .star {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    box-shadow: 0 0 8px #ffffff, 0 0 14px #ff6b9f;
    animation: twinkle 3.5s infinite alternate ease-in-out;
  }

  .star.small  { width: 1.2px; height: 1.2px; }
  .star.medium{ width: 2px; height: 2px; }
  .star.large { width: 2.8px; height: 2.8px; box-shadow: 0 0 10px #ffffff, 0 0 18px #7b61ff; }

  @keyframes twinkle {
    0%   { opacity: 0.3; transform: scale(0.85); }
    100% { opacity: 1;   transform: scale(1.25); }
  }

  .crystal {
    position: absolute;
    width: 3px;
    height: 3px;
    background: linear-gradient(45deg, #fff, #ff6b9f, #7b61ff);
    border-radius: 50%;
    box-shadow: 0 0 12px #ff6b9f, 0 0 22px #7b61ff;
    opacity: 0.75;
    animation: crystalFloat linear infinite;
  }

  @keyframes crystalFloat {
    0%   { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-50px) rotate(720deg); }
  }

  .card{
    width:100%;
    max-width:460px;
    background:#050505;
    border-radius:18px;
    padding:20px;
    box-shadow:0 20px 60px rgba(0,0,0,1), 0 0 25px rgba(255,107,159,0.05);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.03);
    position: relative;
    z-index: 2;
  }

  .header{
    display:flex;
    gap:12px;
    align-items:center;
  }
  .avatar{
    width:64px;height:64px;border-radius:14px;
    background: linear-gradient(135deg,var(--accent), #7b61ff);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:28px;color:#fff;
    box-shadow:0 6px 20px rgba(255,107,159,0.3);
  }
  .names{
    flex:1;
  }
  .names h1{
    margin:0;font-size:18px;letter-spacing:0.6px;
  }
  .names p{margin:3px 0 0;font-size:13px;color:var(--muted)}

  .big-heart{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    margin:12px 0;
    gap:10px;
  }

  .counter-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:10px;
  }
  .counter{
    background:var(--glass);
    border-radius:12px;
    padding:12px;
    min-height:72px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
  }
  .counter .val{
    font-weight:700;
    font-size:20px;
  }
  .counter .lbl{font-size:12px;color:var(--muted);margin-top:4px}

  .poem{
    margin-top:14px;
    padding:12px;
    border-radius:10px;
    background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
    font-size:14px;
    line-height:1.35;
    color:#ffeef6;
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:8px;
    flex-direction:column;
  }

  .controls{
    margin-top:14px;
    display:flex;
    gap:10px;
    justify-content:space-between;
    align-items:center;
  }
  .btn{
    background:transparent;border:1px solid rgba(255,255,255,0.06);
    padding:8px 12px;border-radius:10px;color:var(--muted);
    font-weight:600;font-size:13px;cursor:pointer;
  }
  .btn.primary{
    background: linear-gradient(90deg,var(--accent), #7b61ff);
    border:none;color:white;
    box-shadow:0 8px 24px rgba(255,107,159,0.25);
  }

  .small{font-size:12px;color:var(--muted)}

  .heart {
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background: linear-gradient(180deg,#fff0,#fff0);
    filter: drop-shadow(0 6px 20px rgba(255,107,159,0.15));
    transform-origin:center;
    animation: pulse 1.6s infinite;
  }
  .heart svg{transform:translateY(-2px)}
  @keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.06)}
    100%{transform:scale(1)}
  }

  .heart-pop{
    position:fixed;
    font-size:34px;
    pointer-events:none;
    z-index: 1;
    animation: explode 1.9s ease-out forwards;
  }
  @keyframes explode{
    0%{transform:translate(0,0) scale(0.7); opacity:1;}
    40%{transform:scale(1.35);}
    100%{transform:translate(var(--x), var(--y)) scale(2.4); opacity:0;}
  }

  @media (max-width:420px){
    .avatar{width:56px;height:56px}
  }
</style>
</head>
<body>

<!-- MÜZİK -->
<audio id="bgMusic" autoplay loop playsinline>
  <source src="https://github.com/Cxnizm/Can.Elif/raw/refs/heads/main/AudioCutter_Miyagi%20&%20%D0%AD%D0%BD%D0%B4%D1%88%D0%BF%D0%B8%D0%BB%D1%8C%20feat.%20%D0%A0%D0%B5%D0%BC%20%D0%94%D0%B8%D0%B3%D0%B3%D0%B0%20-%20I%20Got%20Love%20(Official%20Video)(_nidQCt_HEsY_).mp3" type="audio/mpeg">
</audio>

<div class="stars" id="starsContainer"></div>

<div class="card" role="main">
    <div class="header">
      <div class="avatar" id="avatar">❤</div>
      <div class="names">
        <h1 id="title">Can ❤️ Elif</h1>
        <p id="subtitle">Birlikte geçirilen süreci takip et</p>
      </div>
      <div class="big-heart">
        <div class="heart" title="aşk atımı">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden>
            <path d="M12 21s-7.5-4.5-9.5-7.5C-0.5 8 5 4 7.5 6.5 9 8 12 11 12 11s3-3 4.5-4.5C19 4 24.5 8 21.5 13.5 19.5 16.5 12 21 12 21z" fill="url(#g)"/>
            <defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#ff6b9f"/><stop offset="1" stop-color="#7b61ff"/></linearGradient></defs>
          </svg>
        </div>
      </div>
    </div>

    <div class="counter-grid" aria-live="polite">
      <div class="counter">
        <div class="val" id="sinceYears">—</div>
        <div class="lbl">Tanışalı</div>
      </div>
      <div class="counter">
        <div class="val" id="togetherDays">—</div>
        <div class="lbl">Beraberlik süresi</div>
      </div>
      <div class="counter">
        <div class="val" id="lovepower">—</div>
        <div class="lbl">Aşk endeksi</div>
      </div>
      <div class="counter">
        <div class="val" id="secondsAlive">—</div>
        <div class="lbl">Anlık kalp atımı</div>
      </div>
    </div>

    <div class="poem" id="poemArea">
      <div id="poemLine1">Can ile Elif'in hikayesi...</div>
      <div id="poemLine2" class="small">Her saniye daha da büyüyor.</div>
    </div>

    <div class="controls">
      <button class="btn" id="randomize">Rastgele Yenile</button>
      <button class="btn primary" id="celebrate">Kutla 💓</button>
    </div>
  </div>

<script>
// MÜZİK AUTO PLAY FIX
const music = document.getElementById("bgMusic");
function tryPlay(){ music.play().catch(()=>{}); }
document.addEventListener("DOMContentLoaded", tryPlay);
document.addEventListener("click", tryPlay);
document.addEventListener("touchstart", tryPlay);

// ====================== İSİMLERİ BURADAN DEĞİŞTİR ======================
let isim1 = "Can";
let isim2 = "Elif";
// =======================================================================

const startDate = new Date("2026-07-23");

function getRandomInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function createNightSky() {
  const container = document.getElementById('starsContainer');
  
  for(let i = 0; i < 180; i++) {
    const star = document.createElement('div');
    star.className = `star ${Math.random() > 0.85 ? 'large' : Math.random() > 0.6 ? 'medium' : 'small'}`;
    star.style.left = Math.random() * 100 + 'vw';
    star.style.top = Math.random() * 100 + 'vh';
    star.style.animationDelay = Math.random() * 4 + 's';
    container.appendChild(star);
  }

  for(let i = 0; i < 35; i++) {
    const crystal = document.createElement('div');
    crystal.className = 'crystal';
    crystal.style.left = Math.random() * 100 + 'vw';
    crystal.style.animationDuration = (18 + Math.random() * 22) + 's';
    crystal.style.animationDelay = '-' + (Math.random() * 30) + 's';
    crystal.style.opacity = 0.6 + Math.random() * 0.35;
    container.appendChild(crystal);
  }
}

const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const avatar = document.getElementById('avatar');
const sinceYears = document.getElementById('sinceYears');
const togetherDays = document.getElementById('togetherDays');
const lovepower = document.getElementById('lovepower');
const secondsAlive = document.getElementById('secondsAlive');
const poemLine1 = document.getElementById('poemLine1');
const poemLine2 = document.getElementById('poemLine2');

function render(){
  title.textContent = `${isim1} ❤️ ${isim2}`;
  subtitle.textContent = `${isim1} ve ${isim2} in aşk diyarı`;
  avatar.textContent = "❤";

  const now = new Date();
  const diffMs = now - startDate;
  const days = Math.floor(diffMs / (1000*60*60*24));
  const years = Math.floor(days / 365);

  sinceYears.textContent = `${years} yıl`;
  togetherDays.textContent = `${days} gün`;
  lovepower.textContent = `${getRandomInt(60,100)}%`;
  secondsAlive.textContent = `${getRandomInt(60,120)} bpm`;

  const poems = [
    ["Gözlerin sabah gibi, içim aydınlık olsun.", "Yanında her şey daha güzel, sen yeter ki gül."],
    ["Sen gülünce dünya daha yakın geliyor bana.", "Adınla başlar günüm, sevdanla biter gecem."],
    ["Birlikte olduğumuz her saniye, yeni bir şarkı.", "Ellerimiz birbirine değince zaman duruyor."],
    ["Kalbim sana söz verdi, susmayacak hiç.", "Can ve Elif — iki basit kelime, koca bir evren."]
  ];
  const choice = poems[getRandomInt(0, poems.length-1)];
  poemLine1.textContent = choice[0];
  poemLine2.textContent = choice[1];
}
render();

setInterval(() => {
  secondsAlive.textContent = `${getRandomInt(55,120)} bpm`;
}, 1000);

document.getElementById('celebrate').addEventListener('click', heartExplosion);
document.getElementById('randomize').addEventListener('click', render);

function heartExplosion(){
  const cx = innerWidth / 2;
  const cy = innerHeight / 2;

  for(let i = 0; i < 70; i++){
    const h = document.createElement("div");
    h.className = "heart-pop";
    h.textContent = "💗";

    const angle = Math.random() * Math.PI * 2;
    const distance = Math.random() * 300 + 90;
    const x = Math.cos(angle) * distance + "px";
    const y = Math.sin(angle) * distance + "px";

    h.style.left = cx + "px";
    h.style.top = cy + "px";
    h.style.setProperty("--x", x);
    h.style.setProperty("--y", y);
    h.style.animationDelay = (Math.random() * 0.4) + "s";

    document.body.appendChild(h);
    setTimeout(() => h.remove(), 2200);
  }
}

window.onload = createNightSky;
</script>
</body>
          </html>
